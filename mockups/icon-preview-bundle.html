<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Иконка комплекта — варианты</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; padding: 40px; }
  h1 { text-align: center; color: #0f172a; font-size: 22px; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 28px 20px 20px; border: 1px solid #e2e8f0; text-align: center; }
  .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.07); }
  .row { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; align-items: flex-end; }
  .bg { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
  .bg.sm { width: 44px; height: 44px; border-radius: 12px; }
  .name { font-weight: 700; color: #1e293b; font-size: 15px; margin-bottom: 2px; }
  .desc { color: #94a3b8; font-size: 11px; }
</style>
</head>
<body>
<h1>Комплект (Bundle) — 3 варианта</h1>

<div class="grid">

<!-- Вариант 1: Две банки с лентой -->
<div class="card">
  <div class="row">
    <div>
      <div class="bg" style="background:#f5f3ed">
        <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
          <!-- банка 1 (сзади, сдвинута влево) -->
          <rect x="6" y="9" width="18" height="30" rx="4" fill="#f0efe8" stroke="#d4d0c8" stroke-width="1.2"/>
          <rect x="8" y="6.5" width="14" height="5" rx="2.5" fill="#c9a94e" stroke="#b08d30" stroke-width=".8"/>
          <rect x="8" y="36" width="14" height="3.5" rx="1.5" fill="#c9a94e" stroke="#b08d30" stroke-width=".8"/>
          <rect x="8" y="16" width="14" height="14" rx="1" fill="white" stroke="#e8e0c8" stroke-width=".6"/>
          <rect x="8" y="16" width="14" height="3" rx=".8" fill="#c9a94e" opacity=".7"/>

          <!-- банка 2 (спереди, сдвинута вправо) -->
          <rect x="22" y="7" width="20" height="33" rx="4.5" fill="#f8f8f6" stroke="#d4d0c8" stroke-width="1.3"/>
          <rect x="24" y="4.5" width="16" height="5.5" rx="2.8" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="26" y="6" width="12" height="2.5" rx="1" fill="#dfc065" opacity=".5"/>
          <rect x="24" y="37" width="16" height="4" rx="2" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="24" y="15" width="16" height="16" rx="1.2" fill="white" stroke="#e8e0c8" stroke-width=".7"/>
          <rect x="24" y="15" width="16" height="3.2" rx=".8" fill="#c9a94e" opacity=".8"/>
          <text x="32" y="17.5" text-anchor="middle" fill="white" font-size="2.8" font-weight="800" font-family="sans-serif">GRAFLab</text>
          <rect x="26" y="20.5" width="12" height="1.3" rx=".3" fill="#b08d30" opacity=".3"/>
          <rect x="26" y="23" width="8" height="1" rx=".3" fill="#c9a94e" opacity=".2"/>
          <path d="M38 11v26" stroke="white" stroke-width="1.5" opacity=".3" stroke-linecap="round"/>

          <!-- лента/обвязка -->
          <rect x="4" y="22" width="42" height="4" rx="1.5" fill="#c9a94e" opacity=".25" stroke="#b08d30" stroke-width=".8"/>
          <rect x="18" y="20" width="8" height="8" rx="4" fill="#c9a94e" opacity=".15" stroke="#b08d30" stroke-width=".7"/>
          <text x="22" y="25.5" text-anchor="middle" fill="#b08d30" font-size="4" font-weight="800" font-family="sans-serif">2</text>
        </svg>
      </div>
    </div>
    <div>
      <div class="bg sm" style="background:#f5f3ed">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="9" width="18" height="30" rx="4" fill="#f0efe8" stroke="#d4d0c8" stroke-width="1.2"/>
          <rect x="8" y="6.5" width="14" height="5" rx="2.5" fill="#c9a94e"/>
          <rect x="22" y="7" width="20" height="33" rx="4.5" fill="#f8f8f6" stroke="#d4d0c8" stroke-width="1.3"/>
          <rect x="24" y="4.5" width="16" height="5.5" rx="2.8" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="24" y="37" width="16" height="4" rx="2" fill="#c9a94e"/>
          <rect x="24" y="15" width="16" height="16" rx="1.2" fill="white"/>
          <rect x="24" y="15" width="16" height="3.2" rx=".8" fill="#c9a94e" opacity=".8"/>
          <rect x="4" y="22" width="42" height="4" rx="1.5" fill="#c9a94e" opacity=".25" stroke="#b08d30" stroke-width=".8"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="name">Вариант 1</div>
  <div class="desc">Две банки с золотой лентой и цифрой "2"</div>
</div>

<!-- Вариант 2: Три банки веером -->
<div class="card">
  <div class="row">
    <div>
      <div class="bg" style="background:#f5f3ed">
        <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
          <!-- банка 1 (левая, наклон) -->
          <g transform="rotate(-8 14 24)">
            <rect x="4" y="10" width="16" height="28" rx="3.5" fill="#f0efe8" stroke="#d4d0c8" stroke-width="1"/>
            <rect x="6" y="8" width="12" height="4" rx="2" fill="#c9a94e" stroke="#b08d30" stroke-width=".7"/>
            <rect x="6" y="35" width="12" height="3" rx="1.5" fill="#c9a94e"/>
            <rect x="6" y="16" width="12" height="12" rx="1" fill="white" stroke="#e8e0c8" stroke-width=".5"/>
            <rect x="6" y="16" width="12" height="2.5" rx=".6" fill="#c9a94e" opacity=".7"/>
          </g>

          <!-- банка 2 (центральная, прямо) -->
          <rect x="14" y="6" width="20" height="34" rx="4.5" fill="#f8f8f6" stroke="#d4d0c8" stroke-width="1.3"/>
          <rect x="16" y="3.5" width="16" height="5.5" rx="2.8" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="18" y="5" width="12" height="2.5" rx="1" fill="#dfc065" opacity=".5"/>
          <rect x="16" y="37" width="16" height="4" rx="2" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="16" y="14" width="16" height="16" rx="1.2" fill="white" stroke="#e8e0c8" stroke-width=".7"/>
          <rect x="16" y="14" width="16" height="3.2" rx=".8" fill="#c9a94e" opacity=".8"/>
          <text x="24" y="16.5" text-anchor="middle" fill="white" font-size="2.8" font-weight="800" font-family="sans-serif">GRAFLab</text>
          <path d="M30 9v28" stroke="white" stroke-width="1.5" opacity=".3" stroke-linecap="round"/>

          <!-- банка 3 (правая, наклон) -->
          <g transform="rotate(8 34 24)">
            <rect x="28" y="10" width="16" height="28" rx="3.5" fill="#f0efe8" stroke="#d4d0c8" stroke-width="1"/>
            <rect x="30" y="8" width="12" height="4" rx="2" fill="#c9a94e" stroke="#b08d30" stroke-width=".7"/>
            <rect x="30" y="35" width="12" height="3" rx="1.5" fill="#c9a94e"/>
            <rect x="30" y="16" width="12" height="12" rx="1" fill="white" stroke="#e8e0c8" stroke-width=".5"/>
            <rect x="30" y="16" width="12" height="2.5" rx=".6" fill="#c9a94e" opacity=".7"/>
          </g>

          <!-- бейдж количества -->
          <circle cx="42" cy="8" r="6" fill="#c9a94e" stroke="#b08d30" stroke-width=".8"/>
          <text x="42" y="10" text-anchor="middle" fill="white" font-size="6" font-weight="800" font-family="sans-serif">3</text>
        </svg>
      </div>
    </div>
    <div>
      <div class="bg sm" style="background:#f5f3ed">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <g transform="rotate(-8 14 24)"><rect x="4" y="10" width="16" height="28" rx="3.5" fill="#f0efe8" stroke="#d4d0c8" stroke-width="1"/><rect x="6" y="8" width="12" height="4" rx="2" fill="#c9a94e"/></g>
          <rect x="14" y="6" width="20" height="34" rx="4.5" fill="#f8f8f6" stroke="#d4d0c8" stroke-width="1.3"/><rect x="16" y="3.5" width="16" height="5.5" rx="2.8" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/><rect x="16" y="37" width="16" height="4" rx="2" fill="#c9a94e"/><rect x="16" y="14" width="16" height="16" rx="1.2" fill="white"/><rect x="16" y="14" width="16" height="3.2" rx=".8" fill="#c9a94e" opacity=".8"/>
          <g transform="rotate(8 34 24)"><rect x="28" y="10" width="16" height="28" rx="3.5" fill="#f0efe8" stroke="#d4d0c8" stroke-width="1"/><rect x="30" y="8" width="12" height="4" rx="2" fill="#c9a94e"/></g>
          <circle cx="42" cy="8" r="6" fill="#c9a94e" stroke="#b08d30" stroke-width=".8"/><text x="42" y="10" text-anchor="middle" fill="white" font-size="6" font-weight="800" font-family="sans-serif">3</text>
        </svg>
      </div>
    </div>
  </div>
  <div class="name">Вариант 2</div>
  <div class="desc">Три банки веером + бейдж с цифрой</div>
</div>

<!-- Вариант 3: Банка + подарочная коробка -->
<div class="card">
  <div class="row">
    <div>
      <div class="bg" style="background:#f5f3ed">
        <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
          <!-- подарочная коробка (сзади) -->
          <rect x="4" y="14" width="24" height="22" rx="2" fill="#f0ece0" stroke="#d4c8a8" stroke-width="1.2"/>
          <rect x="4" y="11" width="24" height="5" rx="1.5" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <!-- крестовина ленты на коробке -->
          <line x1="16" y1="16" x2="16" y2="36" stroke="#c9a94e" stroke-width="2" opacity=".4"/>
          <line x1="4" y1="25" x2="28" y2="25" stroke="#c9a94e" stroke-width="2" opacity=".4"/>
          <!-- бантик -->
          <ellipse cx="16" cy="12" rx="4" ry="2.5" fill="#dfc065" opacity=".6" stroke="#b08d30" stroke-width=".6"/>

          <!-- банка (спереди, справа) -->
          <rect x="24" y="6" width="20" height="34" rx="4.5" fill="#f8f8f6" stroke="#d4d0c8" stroke-width="1.3"/>
          <rect x="26" y="3.5" width="16" height="5.5" rx="2.8" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="28" y="5" width="12" height="2.5" rx="1" fill="#dfc065" opacity=".5"/>
          <rect x="26" y="37" width="16" height="4" rx="2" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="26" y="14" width="16" height="16" rx="1.2" fill="white" stroke="#e8e0c8" stroke-width=".7"/>
          <rect x="26" y="14" width="16" height="3.2" rx=".8" fill="#c9a94e" opacity=".8"/>
          <text x="34" y="16.5" text-anchor="middle" fill="white" font-size="2.8" font-weight="800" font-family="sans-serif">GRAFLab</text>
          <rect x="28" y="19.5" width="12" height="1.3" rx=".3" fill="#b08d30" opacity=".3"/>
          <path d="M40 9v28" stroke="white" stroke-width="1.5" opacity=".3" stroke-linecap="round"/>

          <!-- бейдж "SET" -->
          <rect x="34" y="41" width="14" height="7" rx="3.5" fill="#c9a94e" stroke="#b08d30" stroke-width=".8"/>
          <text x="41" y="46" text-anchor="middle" fill="white" font-size="4.5" font-weight="800" font-family="sans-serif">SET</text>
        </svg>
      </div>
    </div>
    <div>
      <div class="bg sm" style="background:#f5f3ed">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="14" width="24" height="22" rx="2" fill="#f0ece0" stroke="#d4c8a8" stroke-width="1.2"/>
          <rect x="4" y="11" width="24" height="5" rx="1.5" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <line x1="16" y1="16" x2="16" y2="36" stroke="#c9a94e" stroke-width="2" opacity=".4"/>
          <rect x="24" y="6" width="20" height="34" rx="4.5" fill="#f8f8f6" stroke="#d4d0c8" stroke-width="1.3"/>
          <rect x="26" y="3.5" width="16" height="5.5" rx="2.8" fill="#c9a94e" stroke="#b08d30" stroke-width="1"/>
          <rect x="26" y="37" width="16" height="4" rx="2" fill="#c9a94e"/><rect x="26" y="14" width="16" height="16" rx="1.2" fill="white"/><rect x="26" y="14" width="16" height="3.2" rx=".8" fill="#c9a94e" opacity=".8"/>
          <rect x="34" y="41" width="14" height="7" rx="3.5" fill="#c9a94e"/><text x="41" y="46" text-anchor="middle" fill="white" font-size="4.5" font-weight="800" font-family="sans-serif">SET</text>
        </svg>
      </div>
    </div>
  </div>
  <div class="name">Вариант 3</div>
  <div class="desc">Банка + подарочная коробка с лентой + бейдж SET</div>
</div>

</div>
</body>
</html>
