<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Паллет — вид сверху</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #f1f5f9; padding: 40px; }
  h1 { text-align: center; color: #0f172a; font-size: 22px; margin-bottom: 32px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 28px 20px 20px; border: 1px solid #e2e8f0; text-align: center; }
  .card:hover { box-shadow: 0 8px 30px rgba(0,0,0,0.07); }
  .row { display: flex; justify-content: center; gap: 20px; margin-bottom: 14px; align-items: flex-end; }
  .bg { width: 64px; height: 64px; border-radius: 16px; display: flex; align-items: center; justify-content: center; }
  .bg.sm { width: 44px; height: 44px; border-radius: 12px; }
  .name { font-weight: 700; color: #1e293b; font-size: 14px; margin-bottom: 2px; }
  .desc { color: #94a3b8; font-size: 11px; }
</style>
</head>
<body>
<h1>Паллет — пустой вид сверху</h1>

<div class="grid">

<!-- Вариант 1: Чистый вид сверху -->
<div class="card">
  <div class="row">
    <div>
      <div class="bg" style="background:#f5efe5">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
          <!-- основание — 3 поперечные доски -->
          <rect x="4" y="4" width="40" height="40" rx="1.5" fill="#dbb866" stroke="#b89530" stroke-width="1"/>
          <!-- продольные доски (5 штук) -->
          <rect x="4" y="4" width="7" height="40" rx=".5" fill="#c9a44a" stroke="#a88520" stroke-width=".6"/>
          <rect x="12.5" y="4" width="7" height="40" rx=".5" fill="#d4b05a" stroke="#a88520" stroke-width=".6"/>
          <rect x="21" y="4" width="7" height="40" rx=".5" fill="#c9a44a" stroke="#a88520" stroke-width=".6"/>
          <rect x="29.5" y="4" width="7" height="40" rx=".5" fill="#d4b05a" stroke="#a88520" stroke-width=".6"/>
          <rect x="37" y="4" width="7" height="40" rx=".5" fill="#c9a44a" stroke="#a88520" stroke-width=".6"/>
          <!-- поперечные перекладины (3 штуки, темнее) -->
          <rect x="4" y="6" width="40" height="3" rx=".5" fill="#b89530" opacity=".3"/>
          <rect x="4" y="22.5" width="40" height="3" rx=".5" fill="#b89530" opacity=".3"/>
          <rect x="4" y="39" width="40" height="3" rx=".5" fill="#b89530" opacity=".3"/>
          <!-- текстура дерева -->
          <line x1="7" y1="4" x2="7" y2="44" stroke="#b89530" stroke-width=".3" opacity=".3"/>
          <line x1="15.5" y1="4" x2="15.5" y2="44" stroke="#b89530" stroke-width=".3" opacity=".3"/>
          <line x1="24.5" y1="4" x2="24.5" y2="44" stroke="#b89530" stroke-width=".3" opacity=".3"/>
          <line x1="33" y1="4" x2="33" y2="44" stroke="#b89530" stroke-width=".3" opacity=".3"/>
          <line x1="40" y1="4" x2="40" y2="44" stroke="#b89530" stroke-width=".3" opacity=".3"/>
          <!-- гвозди/точки -->
          <circle cx="7.5" cy="7.5" r=".8" fill="#8a7020" opacity=".5"/>
          <circle cx="7.5" cy="24" r=".8" fill="#8a7020" opacity=".5"/>
          <circle cx="7.5" cy="40.5" r=".8" fill="#8a7020" opacity=".5"/>
          <circle cx="40.5" cy="7.5" r=".8" fill="#8a7020" opacity=".5"/>
          <circle cx="40.5" cy="24" r=".8" fill="#8a7020" opacity=".5"/>
          <circle cx="40.5" cy="40.5" r=".8" fill="#8a7020" opacity=".5"/>
        </svg>
      </div>
    </div>
    <div>
      <div class="bg sm" style="background:#f5efe5">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect x="4" y="4" width="40" height="40" rx="1.5" fill="#dbb866" stroke="#b89530" stroke-width="1"/>
          <rect x="4" y="4" width="7" height="40" rx=".5" fill="#c9a44a" stroke="#a88520" stroke-width=".6"/>
          <rect x="12.5" y="4" width="7" height="40" rx=".5" fill="#d4b05a" stroke="#a88520" stroke-width=".6"/>
          <rect x="21" y="4" width="7" height="40" rx=".5" fill="#c9a44a" stroke="#a88520" stroke-width=".6"/>
          <rect x="29.5" y="4" width="7" height="40" rx=".5" fill="#d4b05a" stroke="#a88520" stroke-width=".6"/>
          <rect x="37" y="4" width="7" height="40" rx=".5" fill="#c9a44a" stroke="#a88520" stroke-width=".6"/>
          <rect x="4" y="6" width="40" height="3" rx=".5" fill="#b89530" opacity=".3"/>
          <rect x="4" y="22.5" width="40" height="3" rx=".5" fill="#b89530" opacity=".3"/>
          <rect x="4" y="39" width="40" height="3" rx=".5" fill="#b89530" opacity=".3"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="name">Вариант 1</div>
  <div class="desc">Вид сверху — доски + перекладины + гвозди</div>
</div>

<!-- Вариант 2: С лёгкой тенью и щелями -->
<div class="card">
  <div class="row">
    <div>
      <div class="bg" style="background:#f5efe5">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
          <!-- тень -->
          <rect x="5" y="5" width="40" height="40" rx="1.5" fill="#00000008"/>
          <!-- основание -->
          <rect x="3" y="3" width="42" height="42" rx="1.5" fill="none" stroke="#b89530" stroke-width="1.2"/>
          <!-- доски с щелями -->
          <rect x="3" y="3" width="8" height="42" rx=".5" fill="#d4b05a" stroke="#b89530" stroke-width=".5"/>
          <rect x="12" y="3" width="8" height="42" rx=".5" fill="#c9a44a" stroke="#b89530" stroke-width=".5"/>
          <rect x="21" y="3" width="8" height="42" rx=".5" fill="#d4b05a" stroke="#b89530" stroke-width=".5"/>
          <rect x="29" y="3" width="8" height="42" rx=".5" fill="#c9a44a" stroke="#b89530" stroke-width=".5"/>
          <rect x="37" y="3" width="8" height="42" rx=".5" fill="#d4b05a" stroke="#b89530" stroke-width=".5"/>
          <!-- щели (тёмные линии) -->
          <line x1="11" y1="3" x2="11" y2="45" stroke="#8a7020" stroke-width=".5" opacity=".25"/>
          <line x1="20" y1="3" x2="20" y2="45" stroke="#8a7020" stroke-width=".5" opacity=".25"/>
          <line x1="29" y1="3" x2="29" y2="45" stroke="#8a7020" stroke-width=".5" opacity=".25"/>
          <line x1="37" y1="3" x2="37" y2="45" stroke="#8a7020" stroke-width=".5" opacity=".25"/>
          <!-- поперечины (3 штуки) -->
          <rect x="3" y="5" width="42" height="4" rx=".5" fill="#b89530" opacity=".2"/>
          <rect x="3" y="22" width="42" height="4" rx=".5" fill="#b89530" opacity=".2"/>
          <rect x="3" y="39" width="42" height="4" rx=".5" fill="#b89530" opacity=".2"/>
        </svg>
      </div>
    </div>
    <div>
      <div class="bg sm" style="background:#f5efe5">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <rect x="3" y="3" width="42" height="42" rx="1.5" fill="none" stroke="#b89530" stroke-width="1.2"/>
          <rect x="3" y="3" width="8" height="42" rx=".5" fill="#d4b05a" stroke="#b89530" stroke-width=".5"/>
          <rect x="12" y="3" width="8" height="42" rx=".5" fill="#c9a44a" stroke="#b89530" stroke-width=".5"/>
          <rect x="21" y="3" width="8" height="42" rx=".5" fill="#d4b05a" stroke="#b89530" stroke-width=".5"/>
          <rect x="29" y="3" width="8" height="42" rx=".5" fill="#c9a44a" stroke="#b89530" stroke-width=".5"/>
          <rect x="37" y="3" width="8" height="42" rx=".5" fill="#d4b05a" stroke="#b89530" stroke-width=".5"/>
          <rect x="3" y="5" width="42" height="4" rx=".5" fill="#b89530" opacity=".2"/>
          <rect x="3" y="22" width="42" height="4" rx=".5" fill="#b89530" opacity=".2"/>
          <rect x="3" y="39" width="42" height="4" rx=".5" fill="#b89530" opacity=".2"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="name">Вариант 2</div>
  <div class="desc">Вид сверху — доски с щелями и тенью</div>
</div>

<!-- Вариант 3: Немного перспективы -->
<div class="card">
  <div class="row">
    <div>
      <div class="bg" style="background:#f5efe5">
        <svg width="40" height="40" viewBox="0 0 48 48" fill="none">
          <!-- лёгкая перспектива — трапеция -->
          <path d="M6 6h36l2 36H4L6 6z" fill="#dbb866" stroke="#b89530" stroke-width="1.2" stroke-linejoin="round"/>
          <!-- доски -->
          <path d="M6 6l-0.4 7.2h37.6L44 6H6z" fill="#c9a44a"/>
          <path d="M5.6 14.2l-0.4 7h38.4l0.4-7H5.6z" fill="#d4b05a"/>
          <path d="M5.2 22.2l-0.4 7h39.2l0.4-7H5.2z" fill="#c9a44a"/>
          <path d="M4.8 30.2l-0.4 7h40l0.4-7H4.8z" fill="#d4b05a"/>
          <path d="M4.4 38.2l-0.4 3.8h40.8l0.4-3.8H4.4z" fill="#c9a44a"/>
          <!-- разделители -->
          <line x1="14" y1="6" x2="13" y2="42" stroke="#b89530" stroke-width=".6" opacity=".3"/>
          <line x1="24" y1="6" x2="24" y2="42" stroke="#b89530" stroke-width=".6" opacity=".3"/>
          <line x1="34" y1="6" x2="35" y2="42" stroke="#b89530" stroke-width=".6" opacity=".3"/>
          <!-- поперечины -->
          <rect x="5.5" y="7.5" width="37" height="2" rx=".3" fill="#b89530" opacity=".15"/>
          <rect x="4.8" y="23" width="38.4" height="2" rx=".3" fill="#b89530" opacity=".15"/>
          <rect x="4.2" y="38.5" width="39.5" height="2" rx=".3" fill="#b89530" opacity=".15"/>
        </svg>
      </div>
    </div>
    <div>
      <div class="bg sm" style="background:#f5efe5">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
          <path d="M6 6h36l2 36H4L6 6z" fill="#dbb866" stroke="#b89530" stroke-width="1.2" stroke-linejoin="round"/>
          <path d="M6 6l-0.4 7.2h37.6L44 6H6z" fill="#c9a44a"/>
          <path d="M5.6 14.2l-0.4 7h38.4l0.4-7H5.6z" fill="#d4b05a"/>
          <path d="M5.2 22.2l-0.4 7h39.2l0.4-7H5.2z" fill="#c9a44a"/>
          <path d="M4.8 30.2l-0.4 7h40l0.4-7H4.8z" fill="#d4b05a"/>
          <path d="M4.4 38.2l-0.4 3.8h40.8l0.4-3.8H4.4z" fill="#c9a44a"/>
          <line x1="14" y1="6" x2="13" y2="42" stroke="#b89530" stroke-width=".6" opacity=".3"/>
          <line x1="24" y1="6" x2="24" y2="42" stroke="#b89530" stroke-width=".6" opacity=".3"/>
          <line x1="34" y1="6" x2="35" y2="42" stroke="#b89530" stroke-width=".6" opacity=".3"/>
        </svg>
      </div>
    </div>
  </div>
  <div class="name">Вариант 3</div>
  <div class="desc">Вид сверху с лёгкой перспективой</div>
</div>

</div>
</body>
</html>
