<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Упаковка — Вариант B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a14;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .phone-frame {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: #0f0f1a;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .back-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: #ffffff08;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    cursor: pointer;
  }
  .header-title {
    color: #e2e8f0;
    font-weight: 600;
    font-size: 15px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .timer-pill {
    background: #1a1a2e;
    border: 1px solid #ffffff0f;
    border-radius: 10px;
    padding: 6px 12px;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  /* Top half: box visualization */
  .box-visual {
    padding: 12px 20px 16px;
    position: relative;
  }
  .box-visual-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .box-visual-title {
    color: #94a3b8;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Circular percentage */
  .circle-pct {
    width: 44px;
    height: 44px;
    position: relative;
  }
  .circle-pct svg {
    width: 100%;
    height: 100%;
    transform: rotate(-90deg);
  }
  .circle-pct-bg { fill: none; stroke: #1e1e3a; stroke-width: 4; }
  .circle-pct-fill {
    fill: none;
    stroke: #7c3aed;
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 113;
    stroke-dashoffset: 37;
  }
  .circle-pct-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #a78bfa;
    font-size: 11px;
    font-weight: 700;
  }

  /* Grid visualization */
  .box-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 6px;
    padding: 20px;
    background: #1a1a2e;
    border-radius: 20px;
    border: 2px solid #ffffff08;
    position: relative;
    min-height: 200px;
  }
  .box-grid::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: 20px;
    border: 1px dashed #ffffff0f;
    pointer-events: none;
  }
  .grid-cell {
    aspect-ratio: 1;
    border-radius: 8px;
    background: #0f0f1a;
    border: 1px solid #ffffff08;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .grid-cell.filled {
    background: linear-gradient(135deg, #7c3aed44, #7c3aed22);
    border-color: #7c3aed55;
  }
  .grid-cell.filled::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, #7c3aed22);
    border-radius: 8px;
  }
  .grid-cell.last-filled {
    background: linear-gradient(135deg, #7c3aed66, #7c3aed44);
    border-color: #a855f7;
    animation: cellPop 0.5s ease;
    box-shadow: 0 0 16px rgba(124, 58, 237, 0.4);
  }
  @keyframes cellPop {
    0% { transform: scale(0.5); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .grid-cell.empty {
    background: #0f0f1a;
    border: 1px dashed #ffffff0f;
  }
  .cell-icon {
    opacity: 0.6;
  }
  .grid-cell.filled .cell-icon { opacity: 1; }

  /* Box info sheet */
  .box-info-sheet {
    margin: 0 20px 12px;
    background: #1a1a2e;
    border-radius: 16px;
    overflow: hidden;
  }
  .sheet-handle {
    width: 32px;
    height: 4px;
    background: #ffffff15;
    border-radius: 2px;
    margin: 10px auto;
  }
  .sheet-content {
    padding: 0 16px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .barcode-visual {
    width: 60px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1px;
    background: white;
    border-radius: 6px;
    padding: 4px 6px;
    flex-shrink: 0;
  }
  .barcode-bar {
    width: 2px;
    height: 100%;
    background: #111;
    border-radius: 1px;
  }
  .barcode-bar:nth-child(2n) { width: 1px; background: #333; }
  .barcode-bar:nth-child(3n) { width: 3px; }
  .sheet-info { flex: 1; }
  .sheet-box-name {
    color: #e2e8f0;
    font-weight: 600;
    font-size: 14px;
  }
  .sheet-box-code {
    color: #64748b;
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    margin-top: 2px;
  }
  .sheet-box-size {
    color: #7c3aed;
    font-size: 11px;
    font-weight: 500;
    margin-top: 2px;
  }

  /* Speed chart */
  .speed-chart-section {
    padding: 0 20px 12px;
  }
  .speed-chart-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .speed-chart-title {
    color: #94a3b8;
    font-size: 12px;
    font-weight: 600;
  }
  .speed-chart-avg {
    color: #64748b;
    font-size: 11px;
  }
  .bar-chart {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    height: 60px;
    padding: 0 4px;
  }
  .chart-bar {
    flex: 1;
    border-radius: 4px 4px 0 0;
    min-height: 4px;
    position: relative;
    transition: height 0.3s;
  }
  .chart-bar.fast { background: linear-gradient(180deg, #10b981, #059669); }
  .chart-bar.normal { background: linear-gradient(180deg, #7c3aed, #6d28d9); }
  .chart-bar.slow { background: linear-gradient(180deg, #f59e0b, #d97706); }
  .chart-bar.very-slow { background: linear-gradient(180deg, #ef4444, #dc2626); }
  .chart-bar-label {
    position: absolute;
    top: -16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 9px;
    color: #64748b;
    white-space: nowrap;
  }

  /* Last scan result */
  .last-scan {
    margin: 0 20px 12px;
    background: linear-gradient(135deg, #065f4699, #04785799);
    border: 1px solid #10b98133;
    border-radius: 14px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    animation: lastScanPop 0.4s ease;
  }
  @keyframes lastScanPop {
    0% { transform: scale(0.95); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .last-scan-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: #10b98133;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .last-scan-info { flex: 1; }
  .last-scan-name {
    color: white;
    font-size: 13px;
    font-weight: 600;
  }
  .last-scan-detail {
    color: #a7f3d0;
    font-size: 11px;
    margin-top: 2px;
  }

  /* Bottom scan input */
  .scan-bottom {
    margin-top: auto;
    padding: 12px 20px;
    background: #13131f;
    border-top: 1px solid #ffffff08;
  }
  .scan-row {
    display: flex;
    gap: 8px;
  }
  .input-wrapper {
    position: relative;
    flex: 1;
  }
  .input-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: #7c3aed;
    z-index: 1;
  }
  .scan-input {
    width: 100%;
    background: #1a1a2e;
    border: 2px solid #7c3aed33;
    border-radius: 14px;
    padding: 14px 14px 14px 44px;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    outline: none;
    transition: all 0.3s;
  }
  .scan-input:focus {
    border-color: #7c3aed;
    box-shadow: 0 0 24px rgba(124, 58, 237, 0.25);
  }
  .scan-input::placeholder { color: #475569; }
  .scan-btn {
    width: 50px;
    height: 50px;
    border-radius: 14px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: none;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <button class="back-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">

  <!-- Box visual -->
  <div class="box-visual">
    <div class="box-visual-header">
      <span class="box-visual-title">Заполнение коробки</span>
      <div class="circle-pct">
        <svg viewBox="0 0 44 44">
          <circle class="circle-pct-bg" cx="22" cy="22" r="18"/>
          <circle class="circle-pct-fill" cx="22" cy="22" r="18"/>
        </svg>
        <div class="circle-pct-text">67%</div>

    </div>
    <div class="box-grid">
      <!-- Row 1 -->
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <!-- Row 2 -->
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <!-- Row 3 -->
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell last-filled"><svg class="cell-icon" width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="2" y="3" width="10" height="8" rx="1.5" stroke="#a78bfa" stroke-width="1.2" fill="none"/></svg></div>
      <div class="grid-cell empty"></div>
      <div class="grid-cell empty"></div>
      <!-- Row 4 -->
      <div class="grid-cell empty"></div>
      <div class="grid-cell empty"></div>
      <div class="grid-cell empty"></div>
      <div class="grid-cell empty"></div>
      <div class="grid-cell empty"></div>
      <div class="grid-cell empty"></div>
    </div>
  </div>

  <!-- Box info sheet -->
  <div class="box-info-sheet">

    <div class="sheet-content">
      <div class="barcode-visual">
        <div class="barcode-bar" style="height:100%"></div>

        <div class="barcode-bar" style="height:100%"></div>

    <div class="bar-chart">

      <div class="input-wrapper">
        <div class="input-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <rect x="2" y="2" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.5" fill="none"/>
