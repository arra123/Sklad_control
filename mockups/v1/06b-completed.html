<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Завершено — Вариант B</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: #0a0a14;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  .phone-frame {
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    background: linear-gradient(180deg, #0f0f1a 0%, #1a1a2e 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Confetti */
  .confetti-container {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 1;
  }
  .confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    top: -20px;
    animation: confettiFall linear infinite;
  }
  .confetti:nth-child(1) { left: 5%; background: #7c3aed; width: 10px; height: 6px; border-radius: 2px; animation-duration: 3.5s; animation-delay: 0s; }
  .confetti:nth-child(2) { left: 15%; background: #3b82f6; width: 6px; height: 10px; border-radius: 1px; animation-duration: 4s; animation-delay: 0.3s; }
  .confetti:nth-child(3) { left: 25%; background: #f59e0b; width: 8px; height: 8px; border-radius: 50%; animation-duration: 3.2s; animation-delay: 0.6s; }
  .confetti:nth-child(4) { left: 35%; background: #10b981; width: 12px; height: 5px; border-radius: 2px; animation-duration: 4.5s; animation-delay: 0.1s; }
  .confetti:nth-child(5) { left: 45%; background: #a855f7; width: 7px; height: 7px; border-radius: 50%; animation-duration: 3.8s; animation-delay: 0.8s; }
  .confetti:nth-child(6) { left: 55%; background: #ec4899; width: 9px; height: 6px; border-radius: 2px; animation-duration: 3.3s; animation-delay: 0.2s; }
  .confetti:nth-child(7) { left: 65%; background: #06b6d4; width: 6px; height: 10px; border-radius: 1px; animation-duration: 4.2s; animation-delay: 0.5s; }
  .confetti:nth-child(8) { left: 75%; background: #f97316; width: 8px; height: 8px; border-radius: 50%; animation-duration: 3.6s; animation-delay: 0.9s; }
  .confetti:nth-child(9) { left: 85%; background: #7c3aed; width: 10px; height: 5px; border-radius: 2px; animation-duration: 4.1s; animation-delay: 0.4s; }
  .confetti:nth-child(10) { left: 92%; background: #3b82f6; width: 7px; height: 9px; border-radius: 1px; animation-duration: 3.4s; animation-delay: 0.7s; }
  .confetti:nth-child(11) { left: 10%; background: #f59e0b; width: 5px; height: 12px; border-radius: 1px; animation-duration: 4.3s; animation-delay: 1.1s; }
  .confetti:nth-child(12) { left: 30%; background: #ec4899; width: 10px; height: 6px; border-radius: 2px; animation-duration: 3.7s; animation-delay: 1.3s; }
  .confetti:nth-child(13) { left: 50%; background: #10b981; width: 8px; height: 8px; border-radius: 50%; animation-duration: 3.9s; animation-delay: 0.15s; }
  .confetti:nth-child(14) { left: 70%; background: #a855f7; width: 6px; height: 11px; border-radius: 1px; animation-duration: 4.4s; animation-delay: 0.65s; }
  .confetti:nth-child(15) { left: 40%; background: #06b6d4; width: 9px; height: 5px; border-radius: 2px; animation-duration: 3.1s; animation-delay: 1.0s; }

  @keyframes confettiFall {
    0% {
      top: -20px;
      transform: rotate(0deg) translateX(0);
      opacity: 1;
    }
    25% { transform: rotate(90deg) translateX(20px); }
    50% { transform: rotate(180deg) translateX(-15px); opacity: 1; }
    75% { transform: rotate(270deg) translateX(10px); }
    100% {
      top: 110%;
      transform: rotate(360deg) translateX(-20px);
      opacity: 0;
    }
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    z-index: 10;
  }
  .back-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    background: #ffffff08;
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #94a3b8;
    cursor: pointer;
  }
  .done-badge {
    background: #10b98122;
    color: #4ade80;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Content */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    z-index: 10;
    padding: 16px 20px;
  }

  /* Central stat */
  .central-stat {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
  }
  .central-glow {
    position: absolute;
    inset: -30px;
    background: radial-gradient(circle, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
    border-radius: 50%;
    animation: centralGlow 3s ease-in-out infinite;
  }
  @keyframes centralGlow {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.05); }
  }
  .central-number {
    font-size: 64px;
    font-weight: 800;
    color: white;
    line-height: 1;
    z-index: 1;
    text-shadow: 0 0 40px rgba(124, 58, 237, 0.4);
  }
  .central-unit {
    font-size: 24px;
    color: #a78bfa;
    font-weight: 700;
    margin-top: 4px;
    z-index: 1;
  }
  .central-subtitle {
    font-size: 14px;
    color: #64748b;
    margin-top: 8px;
    z-index: 1;
  }

  /* Flower stats */
  .flower-stats {
    position: relative;
    width: 320px;
    height: 200px;
    margin: 16px 0;
  }
  .flower-stat {
    position: absolute;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: #1a1a2e;
    border: 2px solid #ffffff0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: flowerPop 0.5s ease both;
  }
  .flower-stat:nth-child(1) { top: 10px; left: 0; animation-delay: 0.1s; border-color: #3b82f633; }
  .flower-stat:nth-child(2) { top: 0; left: 50%; transform: translateX(-50%); animation-delay: 0.2s; border-color: #7c3aed33; }
  .flower-stat:nth-child(3) { top: 10px; right: 0; animation-delay: 0.3s; border-color: #10b98133; }
  .flower-stat:nth-child(4) { bottom: 0; left: 30px; animation-delay: 0.4s; border-color: #f59e0b33; }
  .flower-stat:nth-child(5) { bottom: 0; right: 30px; animation-delay: 0.5s; border-color: #ec489933; }

  @keyframes flowerPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.1); }
    100% { transform: scale(1); opacity: 1; }
  }
  .flower-stat:nth-child(2) {
    animation: flowerPopCenter 0.5s ease both;
    animation-delay: 0.2s;
  }
  @keyframes flowerPopCenter {
    0% { transform: translateX(-50%) scale(0); opacity: 0; }
    60% { transform: translateX(-50%) scale(1.1); }
    100% { transform: translateX(-50%) scale(1); opacity: 1; }
  }
  .flower-value {
    font-size: 18px;
    font-weight: 800;
    color: #e2e8f0;
    line-height: 1;
  }
  .flower-label {
    font-size: 9px;
    color: #64748b;
    margin-top: 4px;
    text-align: center;
    line-height: 1.2;
  }
  .flower-stat:nth-child(1) .flower-value { color: #60a5fa; }
  .flower-stat:nth-child(2) .flower-value { color: #a78bfa; }
  .flower-stat:nth-child(3) .flower-value { color: #4ade80; }
  .flower-stat:nth-child(4) .flower-value { color: #fbbf24; }
  .flower-stat:nth-child(5) .flower-value { color: #f472b6; }

  /* Timeline */
  .timeline {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 20px 0;
  }
  .timeline-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .timeline-dot-lg {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .timeline-dot-lg.start {
    background: #3b82f622;
    border: 2px solid #3b82f644;
  }
  .timeline-dot-lg.duration {
    background: #7c3aed22;
    border: 2px solid #7c3aed44;
  }
  .timeline-dot-lg.end {
    background: #10b98122;
    border: 2px solid #10b98144;
  }
  .timeline-node-label {
    font-size: 10px;
    color: #64748b;
    font-weight: 500;
  }
  .timeline-node-value {
    font-size: 13px;
    color: #e2e8f0;
    font-weight: 700;
  }
  .timeline-line-seg {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, #3b82f644, #7c3aed44);
    margin-bottom: 36px;
  }
  .timeline-line-seg:last-of-type {
    background: linear-gradient(90deg, #7c3aed44, #10b98144);
  }

  /* Ranking badge */
  .ranking-badge {
    background: linear-gradient(135deg, #f59e0b22, #f59e0b11);
    border: 1px solid #f59e0b44;
    border-radius: 16px;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 8px 0;
    animation: badgeShine 3s ease infinite;
  }
  @keyframes badgeShine {
    0%, 100% { box-shadow: 0 0 0 rgba(245, 158, 11, 0); }
    50% { box-shadow: 0 0 24px rgba(245, 158, 11, 0.15); }
  }
  .badge-trophy {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: #f59e0b22;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .badge-text {
    flex: 1;
  }
  .badge-title {
    color: #fbbf24;
    font-size: 14px;
    font-weight: 700;
  }
  .badge-subtitle {
    color: #92400e;
    font-size: 12px;
    margin-top: 2px;
    color: #d97706;
  }

  /* Bottom buttons */
  .bottom-actions {
    padding: 16px 20px 32px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .btn-primary {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: none;
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 8px 24px rgba(124, 58, 237, 0.3);
    transition: transform 0.2s;
  }
  .btn-primary:active { transform: scale(0.97); }
  .btn-secondary {
    width: 100%;
    padding: 14px;
    border-radius: 14px;
    background: #ffffff08;
    border: 1px solid #ffffff0f;
    color: #94a3b8;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.2s;
  }
  .btn-secondary:active { transform: scale(0.97); }
</style>
</head>
<body>
<div class="phone-frame">
  <!-- Confetti -->
  <div class="confetti-container">
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
    <div class="confetti"></div>
  </div>

  <!-- Header -->
  <div class="header">
    <button class="back-btn">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M11 4L6 9l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
    <div class="done-badge">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 7l3 3 5-5" stroke="#4ade80" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>

    </div>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Central number -->
    <div class="central-stat">
      <div class="central-glow"></div>
      <div class="central-number">247</div>
      <div class="central-unit">шт.</div>
      <div class="central-subtitle">отсканировано за задачу</div>
    </div>

    <!-- Flower stats -->
    <div class="flower-stats">
      <div class="flower-stat">
        <div class="flower-value">4.2</div>
        <div class="flower-label">сек/шт</div>
      </div>
      <div class="flower-stat">
        <div class="flower-value">98%</div>
        <div class="flower-label">точность</div>
      </div>
      <div class="flower-stat">
        <div class="flower-value">3</div>
        <div class="flower-label">ошибки</div>
      </div>
      <div class="flower-stat">
        <div class="flower-value">8</div>
        <div class="flower-label">коробок</div>
      </div>
      <div class="flower-stat">
        <div class="flower-value">+85</div>
        <div class="flower-label">GRA</div>
      </div>
    </div>

    <!-- Timeline -->
    <div class="timeline">
      <div class="timeline-node">
        <div class="timeline-dot-lg start">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <polygon points="6,4 12,8 6,12" fill="#3b82f6"/>
          </svg>
        </div>
        <div class="timeline-node-label">Начало</div>
        <div class="timeline-node-value">14:05</div>
      </div>
      <div class="timeline-line-seg"></div>
      <div class="timeline-node">
        <div class="timeline-dot-lg duration">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="5.5" stroke="#a78bfa" stroke-width="1.5" fill="none"/>
            <path d="M8 5v3l2 1.5" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="timeline-node-label">Длительность</div>
        <div class="timeline-node-value">47 мин</div>
      </div>
      <div class="timeline-line-seg"></div>
      <div class="timeline-node">
        <div class="timeline-dot-lg end">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M4 8l3 3 5-5" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="timeline-node-label">Конец</div>
        <div class="timeline-node-value">14:52</div>
      </div>
    </div>

    <!-- Ranking badge -->
    <div class="ranking-badge">
      <div class="badge-trophy">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <path d="M8 2h8v2H8V2z" fill="#fbbf24"/>
          <path d="M6 4h12v6a6 6 0 01-12 0V4z" stroke="#fbbf24" stroke-width="1.5" fill="none"/>
          <path d="M6 6H4a2 2 0 00-2 2v1a3 3 0 003 3h1" stroke="#fbbf24" stroke-width="1.5" fill="none"/>
          <path d="M18 6h2a2 2 0 012 2v1a3 3 0 01-3 3h-1" stroke="#fbbf24" stroke-width="1.5" fill="none"/>
          <line x1="12" y1="16" x2="12" y2="19" stroke="#fbbf24" stroke-width="1.5"/>
          <path d="M8 19h8v2H8v-2z" fill="#fbbf24" opacity="0.5"/>
        </svg>
      </div>
      <div class="badge-text">
        <div class="badge-title">Топ 3 по скорости сегодня</div>
        <div class="badge-subtitle">Быстрее 89% сотрудников</div>
      </div>
    </div>
  </div>

  <!-- Bottom actions -->
  <div class="bottom-actions">
    <button class="btn-primary">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="3" y="3" width="5" height="5" rx="1" stroke="white" stroke-width="1.5"/>
        <rect x="10" y="3" width="5" height="5" rx="1" stroke="white" stroke-width="1.5"/>
        <rect x="3" y="10" width="5" height="5" rx="1" stroke="white" stroke-width="1.5"/>
        <rect x="10" y="10" width="5" height="5" rx="1" stroke="white" stroke-width="1.5"/>

      К списку задач
    </button>
    <button class="btn-secondary">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="3" y="3" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="9" cy="9" r="3" stroke="currentColor" stroke-width="1.5" fill="none"/>
        <circle cx="14" cy="4" r="1.5" fill="currentColor"/>
      </svg>
      Поделиться результатом
    </button>
  </div>
</div>
</body>
