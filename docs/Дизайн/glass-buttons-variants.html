<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Стеклянные кнопки — 5 вариантов</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .glass-1 { background: rgba(255,255,255,0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
  .glass-1:hover { background: rgba(255,255,255,0.8); }
  .glass-1.active { background: rgba(255,255,255,0.9); border-color: rgba(99,102,241,0.3); box-shadow: 0 2px 8px rgba(99,102,241,0.1); }
</style>
</head>
<body class="bg-gray-100 p-8">

<h1 class="text-2xl font-bold mb-8 text-gray-800">Стеклянные кнопки складов — 5 вариантов</h1>

<!-- Вариант 1: Матовое стекло -->
<div class="mb-8">
  <h2 class="text-sm font-bold text-gray-500 uppercase mb-3">Вариант 1: Матовое стекло (backdrop-blur)</h2>
  <div class="bg-gradient-to-r from-gray-50 to-gray-100 rounded-2xl p-3 flex gap-2">
    <button class="glass-1 active px-5 py-2.5 rounded-xl text-sm font-semibold text-gray-900 flex items-center gap-2 transition-all">
      <span class="w-2 h-2 rounded-full bg-amber-400"></span>Наша продукция нов
    </button>
    <button class="glass-1 px-5 py-2.5 rounded-xl text-sm font-medium text-gray-600 flex items-center gap-2 transition-all">
      <span class="w-2 h-2 rounded-full bg-blue-400"></span>Ижевск FBS нов
    </button>
    <button class="glass-1 px-5 py-2.5 rounded-xl text-sm font-medium text-gray-600 flex items-center gap-2 transition-all">
      <span class="w-2 h-2 rounded-full bg-purple-400"></span>Ижевск FBO
    </button>
    <button class="glass-1 px-5 py-2.5 rounded-xl text-sm font-medium text-gray-600 flex items-center gap-2 transition-all">
      <span class="w-2 h-2 rounded-full bg-green-400"></span>Наша продукция
    </button>
  </div>
</div>

<!-- Вариант 2: Цветные подложки -->
<div class="mb-8">
  <h2 class="text-sm font-bold text-gray-500 uppercase mb-3">Вариант 2: Цветные подложки</h2>
  <div class="flex gap-2">
    <button class="px-5 py-2.5 rounded-xl text-sm font-semibold bg-amber-50 border border-amber-200 text-amber-800 shadow-sm transition-all hover:shadow-md">
      <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-amber-400"></span>Наша продукция нов</span>
    </button>
    <button class="px-5 py-2.5 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 transition-all hover:border-blue-200 hover:bg-blue-50/30">
      <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-blue-400"></span>Ижевск FBS нов</span>
    </button>
    <button class="px-5 py-2.5 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 transition-all hover:border-purple-200 hover:bg-purple-50/30">
      <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-purple-400"></span>Ижевск FBO</span>
    </button>
    <button class="px-5 py-2.5 rounded-xl text-sm font-medium bg-white border border-gray-200 text-gray-600 transition-all hover:border-green-200 hover:bg-green-50/30">
      <span class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-green-400"></span>Наша продукция</span>
    </button>
  </div>
</div>

<!-- Вариант 3: Пилюли с цветной полоской слева -->
<div class="mb-8">
  <h2 class="text-sm font-bold text-gray-500 uppercase mb-3">Вариант 3: Пилюли с полоской</h2>
  <div class="flex gap-2">
    <button class="px-4 py-2 rounded-lg text-sm font-semibold bg-white border-l-[3px] border-l-amber-400 border border-gray-100 text-gray-900 shadow-sm">
      Наша продукция нов
    </button>
    <button class="px-4 py-2 rounded-lg text-sm font-medium bg-white border-l-[3px] border-l-blue-400 border border-gray-100 text-gray-600 hover:shadow-sm transition-all">
      Ижевск FBS нов
    </button>
    <button class="px-4 py-2 rounded-lg text-sm font-medium bg-white border-l-[3px] border-l-purple-400 border border-gray-100 text-gray-600 hover:shadow-sm transition-all">
      Ижевск FBO
    </button>
    <button class="px-4 py-2 rounded-lg text-sm font-medium bg-white border-l-[3px] border-l-green-400 border border-gray-100 text-gray-600 hover:shadow-sm transition-all">
      Наша продукция
    </button>
  </div>
</div>

<!-- Вариант 4: Минимальные чипы -->
<div class="mb-8">
  <h2 class="text-sm font-bold text-gray-500 uppercase mb-3">Вариант 4: Минимальные чипы</h2>
  <div class="bg-gray-50 rounded-2xl p-2 flex gap-1.5 w-fit border border-gray-100">
    <button class="px-4 py-1.5 rounded-lg text-xs font-semibold bg-white text-gray-900 shadow-sm border border-amber-200">
      Наша продукция нов
    </button>
    <button class="px-4 py-1.5 rounded-lg text-xs font-medium text-gray-500 hover:bg-white hover:shadow-sm transition-all">
      Ижевск FBS нов
    </button>
    <button class="px-4 py-1.5 rounded-lg text-xs font-medium text-gray-500 hover:bg-white hover:shadow-sm transition-all">
      Ижевск FBO
    </button>
    <button class="px-4 py-1.5 rounded-lg text-xs font-medium text-gray-500 hover:bg-white hover:shadow-sm transition-all">
      Наша продукция
    </button>
  </div>
</div>

<!-- Вариант 5: Карточки с тенью -->
<div class="mb-8">
  <h2 class="text-sm font-bold text-gray-500 uppercase mb-3">Вариант 5: Карточки с тенью</h2>
  <div class="flex gap-3">
    <button class="px-5 py-3 rounded-2xl text-sm font-semibold bg-white text-gray-900 shadow-md border border-amber-100 ring-2 ring-amber-200/50 transition-all">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-amber-400 ring-2 ring-amber-200"></div>
        Наша продукция нов
      </div>
    </button>
    <button class="px-5 py-3 rounded-2xl text-sm font-medium bg-white text-gray-600 shadow-sm border border-gray-100 hover:shadow-md hover:border-blue-200 transition-all">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-blue-400"></div>
        Ижевск FBS нов
      </div>
    </button>
    <button class="px-5 py-3 rounded-2xl text-sm font-medium bg-white text-gray-600 shadow-sm border border-gray-100 hover:shadow-md hover:border-purple-200 transition-all">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-purple-400"></div>
        Ижевск FBO
      </div>
    </button>
    <button class="px-5 py-3 rounded-2xl text-sm font-medium bg-white text-gray-600 shadow-sm border border-gray-100 hover:shadow-md hover:border-green-200 transition-all">
      <div class="flex items-center gap-2">
        <div class="w-3 h-3 rounded-full bg-green-400"></div>
        Наша продукция
      </div>
    </button>
  </div>
</div>

</body>
</html>
