name: Deploy WMS to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npx vite build --mode sklad

      - name: Clean old frontend assets
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: rm -rf /var/www/bem-dev.ru/sklad/frontend/dist/assets/*

      - name: Upload backend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "backend/src/,backend/package.json,backend/package-lock.json"
          target: /var/www/bem-dev.ru/sklad/
          overwrite: true

      - name: Upload frontend dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "frontend/dist/"
          target: /var/www/bem-dev.ru/sklad/
          overwrite: true

      - name: Ensure Ozon keys in .env
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            ENV_FILE=/var/www/bem-dev.ru/sklad/backend/.env
            grep -q 'OZON_CLIENT_ID' "$ENV_FILE" 2>/dev/null || echo 'OZON_CLIENT_ID=2843272' >> "$ENV_FILE"
            grep -q 'OZON_API_KEY' "$ENV_FILE" 2>/dev/null || echo 'OZON_API_KEY=aa4a0bcf-49d3-4230-94c9-759fb19b8abf' >> "$ENV_FILE"
            grep -q 'OZON2_CLIENT_ID' "$ENV_FILE" 2>/dev/null || echo 'OZON2_CLIENT_ID=163276' >> "$ENV_FILE"
            grep -q 'OZON2_API_KEY' "$ENV_FILE" 2>/dev/null || echo 'OZON2_API_KEY=35bbfde5-9eb8-47f5-b765-1e0a2d09c58d' >> "$ENV_FILE"

      - name: Install deps and restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          script_stop: true
          script: |
            cd /var/www/bem-dev.ru/sklad/backend
            npm install --production
            pm2 delete c-site 2>/dev/null || true
            sleep 1
            fuser -k 3017/tcp 2>/dev/null || true
            sleep 3
            fuser -k 3017/tcp 2>/dev/null || true
            sleep 1
            pm2 start src/server.js --name c-site
            pm2 save
