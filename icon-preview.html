  .colors { display: flex; justify-content: center; gap: 10px; margin-bottom: 16px; }
  .dot { width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .name { font-weight: 700; color: #1e293b; font-size: 15px; text-align: center; margin-bottom: 2px; }
