<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Иконки GRAсклад</title>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; background: #f8fafc; margin: 0; padding: 40px; }
  h1 { text-align: center; color: #1e293b; margin-bottom: 40px; }
  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  .card { background: white; border-radius: 16px; padding: 24px; border: 1px solid #e2e8f0; text-align: center; }
  .card:hover { box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
  .icon-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; }
  .icon-box { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; }
  .name { font-weight: 700; color: #1e293b; font-size: 14px; margin-bottom: 4px; }
  .desc { color: #94a3b8; font-size: 12px; }
</style>
</head>
<body>

<div class="grid">

  <div class="card">
    <div class="icon-row">
      <div class="icon-box" style="background:#ede9fe">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="color:#7c3aed">
          <path d="M3 21V8l9-5 9 5v13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M9 21v-6h6v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

          <path d="M9 21v-6h6v6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M3 8l9 4 9-4" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
        </svg>
      </div>
    </div>

    <div class="desc">Склад</div>
  </div>

  <div class="card">

          <line x1="4" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="1.5"/>
          <line x1="12" y1="3" x2="12" y2="21" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>

      <div class="icon-box" style="background:#1e293b">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="color:white">
          <rect x="4" y="3" width="16" height="18" rx="1.5" stroke="currentColor" stroke-width="1.8"/>
          <line x1="4" y1="9" x2="20" y2="9" stroke="currentColor" stroke-width="1.5"/>
          <line x1="4" y1="15" x2="20" y2="15" stroke="currentColor" stroke-width="1.5"/>

          <line x1="7" y1="20" x2="7" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="17" y1="20" x2="17" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="12" y2="20" stroke="currentColor" stroke-width="1.2" opacity="0.4"/>
          <rect x="5" y="10" width="14" height="7" rx="1" stroke="currentColor" stroke-width="1.5" fill="currentColor" fill-opacity="0.08"/>
          <rect x="7" y="4" width="10" height="6" rx="1" stroke="currentColor" stroke-width="1.3" fill="currentColor" fill-opacity="0.05"/>
        </svg>

      <div class="icon-box" style="background:#1e293b">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="color:white">

          <line x1="7" y1="20" x2="7" y2="22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

  <div class="card">

          <line x1="9.5" y1="8" x2="9.5" y2="16" stroke="currentColor" stroke-width="2"/>

  <div class="card">

      <div class="icon-box" style="background:#f0fdf4">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" style="color:#16a34a">
